    /* Animations */
    @keyframes fadeInLeft {
      from {
        opacity: 0;
        transform: translateX(-50px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes fadeInRight {
      from {
        opacity: 0;
        transform: translateX(50px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
     
    }

.blog-card{
position:relative;
width:330px;
height:420px;
border-radius:15px;
overflow:hidden;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
cursor:pointer;
}

.blog-card img{
width:100%;
height:100%;
object-fit:cover;
transition:0.5s;
}

.blog-overlay{
position:absolute;
bottom:0;
left:0;
width:100%;
padding:25px;
background:linear-gradient(transparent, rgba(0,0,0,0.8));
color:white;
transform:translateY(40%);
transition:0.4s;
}

.blog-card:hover img{
transform:scale(1.1);
}

.blog-card:hover .blog-overlay{
transform:translateY(0);
}

.blog-overlay h3{
background:rgba(0,0,0,0.6);
border-radius:10px;
margin-bottom:10px;
font-size: 25px;
}

.blog-overlay p{
font-size:8px;
margin-bottom:15px;
}
