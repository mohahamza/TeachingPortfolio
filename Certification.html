<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Viewer</title>

<style>
  body {
    /* margin: 0; */
    font-family: Arial, sans-serif;
   
     background: linear-gradient(to right, #1f3c88, #b4dbf0);
    display: flex;
    justify-content: center;
    align-items: center;

    height: 100vh;
  }

  .wrapper {
    display: flex;
    gap: 20px; /* space between cards */
   
  }

  .container {
    text-align: center;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    width: 250px;
  }

  h1 {
    font-size: 18px;
    margin-bottom: 10px;
    color: #2c3e50;
  }

  p {
    color: #666;
    margin-bottom: 20px;
    font-size: 14px;
  }

  .btn {
    display: inline-block;
    padding: 10px 20px;
    font-size: 14px;
    color: white;
    background: rgb(55, 150, 36);
    border-radius: 6px;
    text-decoration: none;
    transition: 0.3s;
  }

  .btn:hover {
    background: red;
    
  }
</style>
</head>

<body>


<div class="wrapper">

  <div class="container">
    <h1>Design a Dream Destination with Ai</h1>
   
    <embed src="Microsoft 1 .pdf" type="application/pdf" width="100%" height="250px">
    <a href="Microsoft 1 .pdf" target="_blank" class="btn">View PDF</a>
  </div>

  <div class="container">
    <h1>Intro To Generative AI and Agents</h1>

    <embed src="Microsoft 2.pdf" type="application/pdf" width="100%" height="250px">
    <a href="Microsoft 2.pdf" target="_blank" class="btn">View PDF</a>
  </div>

  <div class="container">
    <h1>Overview of AI concepts Certificate</h1>
  
    <embed src="Mucrosoft 3.pdf" type="application/pdf" width="100%" height="250px">
    <a href="Mucrosoft 3.pdf" target="_blank" class="btn">View PDF</a>
  </div>
   <div class="container">
    <h1>Embrace responsible AI Principal and Practices</h1>
   
    <embed src="Microsoft 4.pdf" type="application/pdf" width="100%" height="250px">
    <a href="Microsoft 4.pdf" target="_blank" class="btn">View PDF</a>
  </div>

</div>

</body>
</html>
